<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Presentes</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #e2eafc;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        border-top: 8px solid #b1c9ef;
      }
      h2 {
        color: #5b7da1;
        text-align: center;
      }
      .info {
        font-size: 14px;
        color: #6a8caf;
        text-align: center;
        margin-bottom: 20px;
        background: #f1f5ff;
        padding: 10px;
        border-radius: 8px;
      }
      label {
        display: block;
        margin: 10px 0 5px;
        color: #5b7da1;
        font-weight: bold;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #cedfed;
        border-radius: 8px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 15px;
        background: #b1c9ef;
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 8px;
        margin-top: 20px;
        cursor: pointer;
      }
      button:disabled {
        background: #ccc;
      }
      #sucesso {
        display: none;
        text-align: center;
        color: #5b7da1;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="form-content">
        <h2>Lista de Presentes</h2>
        <div class="info">
          Escolha seu presente abaixo. Ao confirmar, um e-mail será enviado
          automaticamente para o casal com os detalhes da sua escolha. ✨
        </div>
        <form id="presenteForm">
          <label>Nome Completo:</label>
          <input type="text" name="nome" required />

          <label>Telefone:</label>
          <input type="tel" name="telefone" required />

          <label>Qual presente escolheu?</label>
          <textarea
            name="presente"
            placeholder="Ex: Jogo de jantar, Air Fryer..."
            required
          ></textarea>

          <button type="submit" id="btnEnviar">Confirmar Presente</button>
        </form>
      </div>
      <div id="sucesso">
        <h3>🎉 Tudo certo!</h3>
        <p>
          Sua escolha foi registrada e o casal já foi notificado por e-mail.
          Obrigado pelo carinho!
        </p>
      </div>
    </div>

    <script>
      // 1. COLE SUA URL ABAIXO ENTRE AS ASPAS:
      const URL_SCRIPT =
        "https://script.google.com/macros/s/AKfycbw1X353XGdKpN-WhP39eXJk7vN5CLjXm9Pp13i6o-F2y6HxYsDVoRF-85CN-ew8Y4k/exec";

      const form = document.getElementById("presenteForm");
      const btn = document.getElementById("btnEnviar");

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Enviando...";

        // Enviando como formulário tradicional para evitar erros de leitura no Google
        fetch(URL_SCRIPT, {
          method: "POST",
          mode: "no-cors",
          body: new URLSearchParams(new FormData(form)),
        })
          .then(() => {
            document.getElementById("form-content").style.display = "none";
            document.getElementById("sucesso").style.display = "block";
          })
          .catch(() => {
            alert("Erro ao enviar. Tente novamente.");
            btn.disabled = false;
          });
      });
    </script>
  </body>
</html>
